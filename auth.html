<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Вход / Регистрация — АвтоLuxe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header small">
    <div class="container header-top">
      <a class="brand" href="index.html">
        <img src="https://jtlhmxgisnhnbevdmfna.supabase.co/storage/v1/object/public/Images/logo.jpg" alt="AutoLuxe logo" class="logo-img">
        <span class="brand-name">АвтоLuxe</span>
      </a>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="auth.html" class="btn-small">Вход</a>
      </nav>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-box">
      <div class="tabs">
        <button class="tab-btn active" type="button" data-tab="login">Вход</button>
        <button class="tab-btn" type="button" data-tab="register">Регистрация</button>
      </div>

      <div id="login" class="tab-content active">
        <form class="auth-form" id="login-form">
          <label>Электронная почта
            <input type="email" name="login" placeholder="email@example.com" required>
          </label>
          <label>Пароль
            <input type="password" name="password" placeholder="••••••" required>
          </label>
          <div id="login-status" class="form-status" data-auth-status role="status" aria-live="polite" hidden></div>
          <div class="auth-actions">
            <button class="btn" type="submit">Войти</button>
            <a class="link" href="#">Забыли пароль?</a>
          </div>
        </form>
      </div>

      <div id="register" class="tab-content">
        <form class="auth-form" id="register-form">
          <label>ФИО
            <input type="text" name="name" placeholder="Иванов Иван" required>
          </label>
          <label>Электронная почта
            <input type="email" name="login" placeholder="email@example.com" required>
          </label>
          <label>Пароль
            <input type="password" name="password" placeholder="••••••" required>
          </label>
          <div id="register-status" class="form-status" data-auth-status role="status" aria-live="polite" hidden></div>
          <div class="auth-actions">
            <button class="btn btn-primary" type="submit">Зарегистрироваться</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div>
          <div class="footer-title">Часы работы</div>
          <div class="footer-text">Пн–Пт: 09:00–20:00</div>
          <div class="footer-text">Сб–Вс: 10:00–18:00</div>
        </div>
        <div>
          <div class="footer-title">Адрес</div>
          <div class="footer-text">г. Москва, ул. Примерная, 10</div>
          <div class="footer-text">Ориентир: БЦ «Авто Плаза», вход А</div>
        </div>
        <div>
          <div class="footer-title">Связаться с нами</div>
          <a class="footer-link" href="tel:+70000000000">+7 (000) 000-00-00</a>
          <a class="footer-link" href="mailto:info@autoluxe.ru">info@autoluxe.ru</a>
        </div>
      </div>
    </div>
  </footer>
  <script type="module" src="server/main.js"></script>
</body>
</html>
